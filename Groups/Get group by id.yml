info:
  name: Get group by id
  type: http
  seq: 2
  tags:
    - Groups

http:
  method: GET
  url: "{{baseUrl}}/groups/:id"
  params:
    - name: id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response
    request:
      url: "{{baseUrl}}/groups/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Group not found
    request:
      url: "{{baseUrl}}/groups/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
